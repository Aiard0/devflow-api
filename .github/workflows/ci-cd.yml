name: CI/CD — Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build e Push Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/devflow-api:latest

  deploy:
    name: Deploy na EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/DevTest.pem
          chmod 400 ~/.ssh/DevTest.pem

      - name: Adicionar EC2 ao known_hosts
        run: ssh-keyscan -H 56.125.219.218 >> ~/.ssh/known_hosts

      - name: Deploy na EC2
        run: |
          ssh -i ~/.ssh/DevTest.pem ubuntu@56.125.219.218 "
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devflow-api:latest &&
            docker rm -f devflow || true &&
            docker run -d \
              --name devflow \
              --restart always \
              -p 8000:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/devflow-api:latest
          "

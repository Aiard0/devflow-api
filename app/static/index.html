<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevFlow API</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }

      .badge {
        display: inline-block;
        background: #1a1f2e;
        border: 1px solid #2d3748;
        border-radius: 999px;
        padding: 0.4rem 1rem;
        font-size: 0.8rem;
        color: #68d391;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
      }

      .badge::before {
        content: "●";
        margin-right: 0.5rem;
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      h1 {
        font-size: 3rem;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.75rem;
      }

      .subtitle {
        color: #718096;
        font-size: 1rem;
        margin-bottom: 2.5rem;
        line-height: 1.6;
      }

      .endpoints {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 2.5rem;
      }

      .endpoint {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        background: #1a1f2e;
        border: 1px solid #2d3748;
        border-radius: 10px;
        padding: 0.85rem 1.25rem;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.2s, transform 0.2s;
      }

      .endpoint:hover {
        border-color: #667eea;
        transform: translateX(4px);
      }

      .method {
        font-size: 0.7rem;
        font-weight: 700;
        background: #2d3748;
        color: #68d391;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
        letter-spacing: 0.05em;
        min-width: 42px;
        text-align: center;
      }

      .path {
        font-family: "Courier New", monospace;
        font-size: 0.95rem;
        color: #e2e8f0;
      }

      .desc {
        margin-left: auto;
        font-size: 0.8rem;
        color: #4a5568;
      }

      .footer {
        font-size: 0.78rem;
        color: #2d3748;
      }

      .footer a {
        color: #4a5568;
        text-decoration: none;
      }

      .footer a:hover {
        color: #667eea;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge">Sistema operacional</div>

      <h1>DevFlow API</h1>
      <p class="subtitle">
        API backend containerizada com FastAPI e Docker,<br />
        com pipeline CI/CD automatizado via GitHub Actions.
      </p>

      <div class="endpoints">
        <a class="endpoint" href="/">
          <span class="method">GET</span>
          <span class="path">/</span>
          <span class="desc">Status da API</span>
        </a>
        <a class="endpoint" href="/health">
          <span class="method">GET</span>
          <span class="path">/health</span>
          <span class="desc">Health check</span>
        </a>
        <a class="endpoint" href="/ping">
          <span class="method">GET</span>
          <span class="path">/ping</span>
          <span class="desc">Ping</span>
        </a>
        <a class="endpoint" href="/docs">
          <span class="method">GET</span>
          <span class="path">/docs</span>
          <span class="desc">Documentação interativa</span>
        </a>
      </div>

      <p class="footer">
        Bootcamp DevOps · Atlantico Avanti ·
        <a href="https://github.com/Aiard0/devflow-api" target="_blank">GitHub</a>
      </p>
    </div>
  </body>
</html>

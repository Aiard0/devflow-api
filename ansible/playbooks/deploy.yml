---
- name: Deploy DevFlow API
  hosts: webservers
  become: true

  vars:
    app_dir: /opt/devflow
    repo_url: https://github.com/Aiard0/devflow-api.git
    repo_branch: main
    image_name: devflow-api
    container_name: devflow
    app_port: 8000

  tasks:
    - name: Criar diretório da aplicação no servidor
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Clonar ou atualizar repositório
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Build da imagem Docker
      ansible.builtin.command:
        cmd: docker build -t {{ image_name }}:latest .
        chdir: "{{ app_dir }}"
      changed_when: true

    - name: Parar e remover container anterior (se existir)
      ansible.builtin.command:
        cmd: docker rm -f {{ container_name }}
      register: docker_rm
      failed_when: docker_rm.rc != 0 and "No such container" not in docker_rm.stderr
      changed_when: docker_rm.rc == 0

    - name: Iniciar novo container
      ansible.builtin.command: >-
        docker run -d
        --name {{ container_name }}
        --restart always
        -p {{ app_port }}:{{ app_port }}
        {{ image_name }}:latest
      changed_when: true

    - name: Aguardar aplicação subir
      ansible.builtin.wait_for:
        host: localhost
        port: "{{ app_port }}"
        timeout: 30

    - name: Verificar saúde da aplicação
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: 200
      register: health
      retries: 3
      delay: 5

    - name: Exibir status da aplicação
      ansible.builtin.debug:
        msg: "Deploy concluído! Status: {{ health.json.status }}"
